spring.application.name=review-service
server.port=9098

spring.datasource.url=jdbc:postgresql://postgres:5432/microservices
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update

spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672

eureka.client.service-url.defaultZone=http://serviceregistry:8761/eureka/

spring.config.import=optional:configserver:http://configms:8888
spring.cloud.config.fail-fast=true
spring.cloud.config.retry.initial-interval=2000
spring.cloud.config.retry.max-attempts=10
